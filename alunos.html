<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGBE - Alunos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/alunos.css">
</head>
<body>
    <header>
        <h1>Gestão de Alunos</h1>
    </header>
    
    <nav>
        <a href="index.html">Home</a>
        <a href="livros.html">Livros</a>
        <a href="alunos.html">Alunos</a>
    </nav>

    <main class="container">
        <section class="card">
            <h3 class="page-title">Cadastrar Aluno</h3>
            <form id="aluno-form">
                <input type="hidden" id="aluno-id">
                <div class="form-grid-aluno">
                    <input type="text" id="nome" placeholder="Nome Completo" required>
                    <input type="text" id="matricula" placeholder="Matrícula" required>
                </div>
                <button type="submit">Cadastrar Aluno</button>
            </form>
        </section>

        <section class="card">
            <h3 class="page-title">Lista de Alunos</h3>
            <table id="alunos-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Matrícula</th>
                        <th class="actions-header">Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>
    <script src="../js/alunos.js"></script>
</body>
</html>
